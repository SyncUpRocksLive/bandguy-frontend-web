<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncUp Rocks Live! | Backstage Access</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rye&family=Bungee&family=Courier+Prime:wght@400;700&family=Anton&display=swap" rel="stylesheet">

    <style>
        .bg-tobacco-burst {
            background: radial-gradient(circle at center, #78350f 0%, #1c1917 70%, #0c0a09 100%);
        }

        @keyframes tube-warmth {
            0%, 100% { opacity: 0.3; transform: scale(1); filter: blur(150px); }
            50% { opacity: 0.6; transform: scale(1.1); filter: blur(180px); }
        }
        .animate-tube { animation: tube-warmth 5s ease-in-out infinite; }

        .font-vintage { font-family: 'Rye', serif; }
        .font-stamp { font-family: 'Bungee', cursive; }
        .font-manual { font-family: 'Courier Prime', monospace; }
        .font-impact { font-family: 'Anton', sans-serif; }

        .nitro-grain {
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            opacity: 0.15;
        }
    </style>
</head>
<body class="bg-stone-950 font-manual text-stone-300">

<div class="relative min-h-screen w-full overflow-hidden flex flex-col items-center justify-center bg-tobacco-burst">
  
  <div class="absolute inset-0 z-0">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-amber-600/20 rounded-full animate-tube"></div>
    <div class="absolute inset-0 nitro-grain pointer-events-none"></div>
  </div>

  <div class="relative z-30 text-center px-6 max-w-5xl">
    
    <div class="mb-4">
       <h1 class="font-vintage text-6xl md:text-9xl text-stone-100 drop-shadow-[0_6px_0_#451a03] tracking-tighter mb-2">
         SyncUp <span class="text-amber-500 italic">Rocks</span>
       </h1>
       <div class="inline-block border-y border-stone-800 py-1 px-10">
          <p class="text-amber-600 font-stamp text-xl md:text-2xl tracking-[0.2em] uppercase">
            Live!
          </p>
       </div>
    </div>
    
    <p class="text-stone-500 font-manual italic text-sm md:text-base mb-16 tracking-wide">
      [ STATUS: IN SOUNDCHECK — OPTIMIZING GAIN STAGING ]
    </p>

    <div class="relative flex items-end justify-center gap-6 mb-20 scale-90 md:scale-100">
      <div class="w-64 h-40 bg-stone-900 border-4 border-stone-800 rounded-t-lg shadow-2xl flex flex-col items-center justify-center relative overflow-hidden group">
        <div class="absolute inset-0 bg-amber-500/5 mix-blend-overlay"></div>
        <div class="text-[9px] text-amber-700 font-bold tracking-widest uppercase opacity-40">Master Session Controller</div>
      </div>
      
      <div class="w-32 h-52 bg-gradient-to-br from-amber-400 via-amber-500 to-amber-700 rounded-2xl -mb-6 shadow-[0_15px_50px_rgba(0,0,0,0.9)] border-4 border-stone-950 flex flex-col items-center pt-8 relative group">
        <div class="w-10 h-10 rounded-full bg-stone-950/30 border border-amber-300/20 flex items-center justify-center">
             <div class="w-1.5 h-1.5 rounded-full bg-amber-100 shadow-[0_0_12px_#fef3c7] animate-pulse"></div>
        </div>
        <div class="absolute bottom-4 w-12 h-1 bg-stone-950/40 rounded-full"></div>
      </div>
      
      <div class="w-16 h-32 bg-stone-950 border-4 border-stone-900 rounded-xl shadow-2xl flex items-center justify-center border-t-stone-800">
         <div class="w-1 h-4 bg-amber-700/30 rounded-full animate-bounce"></div>
      </div>
    </div>

    <div class="flex flex-col items-center">
      
      <div class="space-y-6 mb-12">
        <p class="text-stone-900 font-impact text-xl md:text-3xl tracking-tight uppercase italic max-w-3xl">
          From student musician, garage band, solo act to the next rock legends
        </p>
        
        <div class="flex items-center justify-center gap-4 opacity-40">
            <div class="h-px w-12 bg-amber-600"></div>
            <div class="w-2 h-2 bg-amber-600 rotate-45"></div>
            <div class="h-px w-12 bg-amber-600"></div>
        </div>

        <p class="text-stone-400 font-manual text-sm md:text-lg max-w-2xl mx-auto leading-relaxed uppercase tracking-[0.2em]">
          Play together, play solo, <span class="text-yellow-600 font-bold">keep it synced</span>
        </p>
      </div>

      <div class="flex flex-col items-center gap-6">
        <a href="/mixingroom/" 
           class="group relative inline-flex items-center justify-center px-14 py-6 font-bold text-amber-500 transition-all duration-300 bg-stone-900 border-2 border-amber-600 rounded-none hover:bg-amber-600 hover:text-stone-950 shadow-[8px_8px_0px_#451a03] active:translate-x-[2px] active:translate-y-[2px] active:shadow-none">
          
          <div class="absolute -left-[6px] top-1/2 -translate-y-1/2 w-2 h-5 bg-stone-950 border-r border-amber-600/30 rounded-r-full"></div>
          <div class="absolute -right-[6px] top-1/2 -translate-y-1/2 w-2 h-5 bg-stone-950 border-l border-amber-600/30 rounded-l-full"></div>

          <span class="relative tracking-[0.3em] uppercase font-stamp text-xl">Backstage Pass</span>
        </a>

        <div class="mt-4 flex flex-col items-center gap-2">
            <div class="flex items-center gap-3 text-s">
                <span class="text-stone-400 italic">Looking to learn more?</span>
                <a href="development.html" class="text-amber-800 hover:text-amber-500 font-stamp underline decoration-stone-900 underline-offset-8 transition-all">
                    community & development
                </a>
            </div>
        </div>
      </div>

    </div>
  </div>

  <div class="absolute -bottom-40 -left-40 w-[600px] h-[600px] bg-amber-900/5 rounded-full blur-[120px] pointer-events-none"></div>

</div>

</body>
</html>
