server {
    listen 9000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Support React Router: 
    # Try the literal file, then the directory, 
    # then fall back to index.html for the React app to handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets (JS/CSS/Images)
    # Since React build files have unique hashes, we can cache them forever.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Gzip for faster loading over band-room Wi-Fi
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript;
}
