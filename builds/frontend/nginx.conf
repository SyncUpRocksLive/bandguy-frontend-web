server {
    listen 9000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Avoid leaking internal paths in redirects (e.g., for /jam/host/sets)
    absolute_redirect off;
    port_in_redirect off;

    # 1. THE ROOT (General static files, landing page, etc.)
    location / {
        try_files $uri $uri/ =404; 
    }

    # 2. THE JAM SPA (Scoped to /jam)
    # This ensures /jam/host/sets correctly falls back to /jam/index.html
    location /jam {
        alias /usr/share/nginx/html/jam; # Points to where the SPA build lives
        index index.html;
        try_files $uri $uri/ /jam/index.html;
    }

    location /mixingroom {
        alias /usr/share/nginx/html/mixingroom;
        index index.html;
        try_files $uri $uri/ /mixingroom/index.html;
    }

    # 3. STATIC ASSET CACHING
    # This handles both root assets and /jam/assets/
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # 4. GZIP
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";
}
